<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }
      
      /* NAVBAR */
      .navbar {
        background: #1f2937;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 20px;
      }
      
      .logo {
        color: #fff;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      
      .nav-links {
        display: flex;
        gap: 20px;
      }
      
      .nav-links a {
        color: #fff;
        text-decoration: none;
        font-size: 15px;
        padding: 6px 10px;
        border-radius: 6px;
        transition: 0.3s;
      }
      
      .nav-links a:hover {
        background: #374151;
      }
      
      .btn {
        background: #4f46e5;
        padding: 8px 12px;
        border-radius: 6px;
      }
      
      .btn:hover {
        background: #3730a3;
      }
      
      /* MOBILE */
      .menu-toggle {
        display: none;
        font-size: 24px;
        color: white;
        cursor: pointer;
      }
      
      @media (max-width: 768px) {
        .nav-links {
          display: none;
          flex-direction: column;
          background: #111827;
          position: absolute;
          top: 60px;
          right: 0;
          width: 200px;
          padding: 10px;
        }
      
        .nav-links.active {
          display: flex;
        }
      
        .menu-toggle {
          display: block;
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">Product Website</div>

      <div class="menu-toggle" onclick="toggleMenu()">☰</div>

      <div class="nav-links" id="navLinks">
        {% if request.user.is_authenticated %}
          <a href="{% url 'home_view' %}">Dashboard</a>
          <a href="{% url 'product_list' %}">Product List</a>
          <a href="{% url 'sign_out' %}">Logout</a>
        {% else %}
          <a href="{% url 'sign_up' %}">Register</a>
          <a href="{% url 'sign_in' %}">Login</a>
        {% endif %}
      </div>
    </nav>

    <script>
      function toggleMenu() {
        document.getElementById('navLinks').classList.toggle('active')
      }
    </script>
  </body>
</html>
